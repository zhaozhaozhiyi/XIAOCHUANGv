services:
  postgres:
    image: postgres:16-alpine
    container_name: xiaochuang-postgres
    environment:
      POSTGRES_USER: zhaoxiaogang
      POSTGRES_PASSWORD: xiaochuang
      POSTGRES_DB: xiaochuang
    ports:
      - "5432:5432"
    volumes:
      - ./.local/postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zhaoxiaogang -d xiaochuang"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: xiaochuang-redis
    ports:
      - "6379:6379"
    volumes:
      - ./.local/redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    container_name: xiaochuang-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./.local/minio-data:/data
    command: ["server", "/data", "--console-address", ":9001"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        mc alias set local http://minio:9000 minioadmin minioadmin123 &&
        mc mb --ignore-existing local/xiaochuang-media &&
        mc anonymous set download local/xiaochuang-media
